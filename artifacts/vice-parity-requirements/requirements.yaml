schema: vice-parity-requirements/v1
generatedUtc: 2026-07-01T22:31:29Z
mandate: VICE is the specification. reSID (native/vice/vice/src/resid) is the SID spec; viciisc (native/vice/vice/src/viciisc) is the VIC-II spec. The managed C# must duplicate VICE exactly. Deterministic, so every AC is bit-exact equality, not tolerance. AC tag FAITHFUL = managed already matches (regression-lock, green now); DIVERGENT = managed differs (red now, remediation target).
linkedTodos:
- PLAN-VICEPARITY-001
- PLAN-REQAUDIT-001
prerequisites:
- 'Phase0: add a single-cycle reSID clock() oracle entry point to native/vice-shim.c (current shim uses batched clock(delta_t) which drops pipelines).'
- 'Phase0: add InternalsVisibleTo ViceSharp.TestHarness to ViceSharp.Chips so internal-state ACs can be asserted directly.'
- 'Phase0: retire false-confidence tests (SidEngineParityTests sawtooth-only; SidCombinedWaveformTests asserts the AND).'
- Supersede docs/requirements FR-SID-004/005; reconcile finding IDs vs PLAN-VICEPARITY-001.
newFindings:
- SID accumulator stored 32-bit, not masked to 24 bits.
- 'Power-on seeds wrong: accumulator 0x555555, envelope 0xaa, noise LFSR 0x7ffffe.'
- reset() should preserve envelope_counter and accumulator (managed zeroes them).
- Noise LFSR shared across voices (should be per-voice); wrong zero-reseed; missing 2-cycle shift pipeline.
- Combined-waveform shift-register corruption/lock-up not modeled.
- Hard-sync same-cycle special case missing; ring gated on triangle-selected vs sawtooth-deselected.
- 'Two disagreeing SID wiring paths: Commodore64.cs 6581-no-backend (inert) vs ArchitectureBuilder 8580-with-backend.'
