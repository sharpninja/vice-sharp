<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 227.49985 213.5"
   role="img"
   aria-labelledby="title desc"
   version="1.1"
   id="svg23"
   sodipodi:docname="logo.svg"
   width="227.49985"
   height="213.5"
   inkscape:version="1.4.3 (0d15f75, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview23"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.5820312"
     inkscape:cx="199.74321"
     inkscape:cy="106.82469"
     inkscape:window-width="1920"
     inkscape:window-height="1012"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="g22" />
  <title
     id="title">ViceSharp Logo</title>
  <desc
     id="desc">Modernized Commodore &quot;chicken lips&quot; C (ring plus swallow-tailed naval pennant, blue upper lip, red lower lip) beside a sharp hash, reading C#.</desc>
  <defs
     id="defs11">
    <radialGradient
       id="badge-fill"
       cx="0.38"
       cy="0.28"
       r="0.72000003">
      <stop
         offset="0"
         stop-color="#182436"
         id="stop1" />
      <stop
         offset="0.52"
         stop-color="#0D1320"
         id="stop2" />
      <stop
         offset="1"
         stop-color="#05070C"
         id="stop3" />
    </radialGradient>
    <!-- Modernized Commodore blue (local mark space, 0..130 x 0..122) -->
    <linearGradient
       id="mark-fill"
       x1="0"
       y1="0"
       x2="120"
       y2="122"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#5CE0FF"
         id="stop4" />
      <stop
         offset="1"
         stop-color="#1746C8"
         id="stop5" />
    </linearGradient>
    <!-- Signature pennant red (local mark space) -->
    <linearGradient
       id="mark-red"
       x1="78"
       y1="60"
       x2="130"
       y2="92"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#FF5A5A"
         id="stop6" />
      <stop
         offset="1"
         stop-color="#C20012"
         id="stop7" />
    </linearGradient>
    <linearGradient
       id="edge-fill"
       x1="98"
       y1="86"
       x2="430"
       y2="428"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#F8FAFC"
         id="stop8" />
      <stop
         offset="0.32"
         stop-color="#94A3B8"
         id="stop9" />
      <stop
         offset="1"
         stop-color="#1E293B"
         id="stop10" />
    </linearGradient>
    <filter
       id="soft-shadow"
       x="0"
       y="0"
       width="1"
       height="1">
      <feDropShadow
         dx="0"
         dy="14"
         stdDeviation="14"
         flood-color="#000000"
         flood-opacity="0.38" />
    </filter>
    <filter
       id="mark-glow"
       x="-0.042197831"
       y="-0.044964871"
       width="1.0843957"
       height="1.0899297">
      <feGaussianBlur
         stdDeviation="4"
         result="glow"
         id="feGaussianBlur10" />
      <feColorMatrix
         in="glow"
         type="matrix"
         values="0 0 0 0 0.14 0 0 0 0 0.48 0 0 0 0 1 0 0 0 0.52 0"
         id="feColorMatrix10" />
      <feMerge
         id="feMerge11">
        <feMergeNode
           id="feMergeNode10" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode11" />
      </feMerge>
    </filter>
    <clipPath
       id="badge-clip">
      <circle
         cx="256"
         cy="256"
         r="218"
         id="circle11" />
    </clipPath>
    <linearGradient
       inkscape:collect="always"
       xlink:href="#mark-fill"
       id="linearGradient23"
       gradientUnits="userSpaceOnUse"
       x1="0"
       y1="0"
       x2="120"
       y2="122" />
    <linearGradient
       inkscape:collect="always"
       xlink:href="#mark-fill"
       id="linearGradient24"
       gradientUnits="userSpaceOnUse"
       x1="0"
       y1="0"
       x2="120"
       y2="122" />
  </defs>
  <g
     clip-path="url(#badge-clip)"
     id="g23"
     transform="translate(-56.000156,-149.25)">
    <g
       filter="url(#mark-glow)"
       id="g22">
      <!-- ===================================================================
           Authentic Commodore chicken-head "C".
           Geometry lifted from the official C= mark: an annulus (outer R=61,
           inner R=32, centre ~61,61) open to the right, with a swallow-tailed
           naval pennant filling and protruding from the mouth. Upper lip blue,
           lower lip red, the V-notch between them is the "beak".
           Scaled 1.75x and placed left-of-centre so the pennant points at the #.
           =================================================================== -->
      <g
         transform="matrix(1.75,0,0,1.75,56,149.25)"
         id="g16">
        <!-- The ring -->
        <path
           fill="url(#mark-fill)"
           d="m 78,88.1109 v 31.4724 A 61,61 0 1 1 78,2.4167 v 31.4724 a 32,32 0 1 0 0,54.2218 z"
           id="path15"
           style="fill:url(#linearGradient23)" />
        <!-- Upper pennant lip (blue) -->
        <polygon
           points="106,58 78,58 78,34 130,34 "
           fill="url(#mark-fill)"
           id="polygon15"
           style="fill:url(#linearGradient24)" />
        <!-- Lower pennant lip (red) -->
        <polygon
           points="130,88 78,88 78,64 106,64 "
           fill="url(#mark-red)"
           id="polygon16"
           style="fill:url(#mark-red)" />
      </g>
      <!-- ===================================================================
           Modern hash. Slight lean nods to the musical sharp so C + # reads C#.
           =================================================================== -->
    </g>
  </g>
</svg>
